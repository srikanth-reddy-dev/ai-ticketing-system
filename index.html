<!DOCTYPE html>
<html>
<head>
    <title>AI Ticketing System</title>
</head>

<body>

<h2>Create Ticket</h2>

<input id="name" placeholder="Your Name"><br><br>
<textarea id="issue" placeholder="Describe your issue"></textarea><br><br>

<button onclick="createTicket()">Submit</button>

<h2>All Tickets</h2>
<ul id="list"></ul>

<script>

async function createTicket() {
    const name = document.getElementById("name").value;
    const issue = document.getElementById("issue").value;

    await fetch("http://127.0.0.1:5000/create", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, issue })
    });

    loadTickets();
}

async function loadTickets() {
    const res = await fetch("http://127.0.0.1:5000/tickets");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(t => {
        const li = document.createElement("li");

        li.innerHTML = `
            <strong>${t[1]}</strong><br>
            ${t[2]}<br>
            Category: ${t[3]} | Severity: ${t[4]}<br>
            Summary: ${t[5]}<br>
            Sentiment: ${t[6]}<br>
            Resolution: ${t[7]}<br>
            Confidence: ${t[8]}<br>
            Status: ${t[9]}<br>
            Auto Response: ${t[10]}<br><br>

            <button onclick="feedback('Yes')">Yes</button>
            <button onclick="feedback('No')">No</button>

            <hr>
        `;

        list.appendChild(li);
    });
}

function feedback(ans) {
    alert("Feedback recorded: " + ans);
}

loadTickets();

</script>

</body>
</html>
